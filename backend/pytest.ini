[pytest]
# Core pytest configuration
pythonpath = .
asyncio_mode = auto
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output and verbosity
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra

# Test markers for test layers
markers =
    unit: Unit tests (services, repositories, utilities - no DB)
    integration: Integration tests (API endpoints, full workflows - real DB)
    asyncio: Async test marker
    slow: Slow running tests
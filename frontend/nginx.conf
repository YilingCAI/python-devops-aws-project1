server {
    listen 4200;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long-lived cache (Angular outputs hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: all other routes serve index.html so Angular router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }
}

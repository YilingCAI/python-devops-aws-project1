name: "Docker Build"
description: "Build and push Docker image to registry"

inputs:
  context:
    description: "Build context path"
    required: true
  dockerfile:
    description: "Dockerfile path"
    required: true
  image-name:
    description: "Image name (without registry)"
    required: true
  registry:
    description: "Container registry"
    required: false
    default: "ghcr.io"
  registry-username:
    description: "Registry username"
    required: true
  registry-password:
    description: "Registry password/token"
    required: true
  push:
    description: "Push to registry after build"
    required: false
    default: "true"
  scan:
    description: "Run Trivy vulnerability scan"
    required: false
    default: "true"
  cache:
    description: "Use GitHub Actions cache"
    required: false
    default: "true"

outputs:
  image-uri:
    description: "Full image URI"
    value: ${{ steps.meta.outputs.tags }}
  image-digest:
    description: "Image digest"
    value: ${{ steps.build.outputs.digest }}
  vulnerabilities-found:
    description: "Whether vulnerabilities were found"
    value: ${{ steps.trivy.outputs.vulnerabilities-found }}

runs:
  using: "composite"
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to registry
      uses: docker/login-action@v2
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry-username }}
        password: ${{ inputs.registry-password }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ inputs.registry }}/${{ inputs.image-name }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=semver,pattern={{version}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v4
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: ${{ inputs.cache == 'true' && 'type=gha' || '' }}
        cache-to: ${{ inputs.cache == 'true' && 'type=gha,mode=max' || '' }}
        build-args: |
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          VCS_REF=${{ github.sha }}
          VERSION=${{ github.ref_name }}

    - name: Run Trivy vulnerability scan
      id: trivy
      if: inputs.scan == 'true'
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ steps.meta.outputs.tags }}
        format: "sarif"
        output: "trivy-results.sarif"
        severity: "CRITICAL,HIGH"
      continue-on-error: true

    - name: Upload Trivy results
      if: inputs.scan == 'true'
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: "trivy-results.sarif"
        category: "trivy-docker-${{ inputs.image-name }}"
      continue-on-error: true

    - name: Report build completion
      shell: bash
      run: |
        echo "✓ Docker image built and pushed"
        echo "  Image: ${{ steps.meta.outputs.tags }}"
        echo "  Digest: ${{ steps.build.outputs.digest }}"

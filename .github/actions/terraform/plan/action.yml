name: "Terraform Plan"
description: "Generate Terraform plan for infrastructure changes"

inputs:
  working-directory:
    description: "Terraform working directory"
    required: false
    default: "./infra"
  terraform-version:
    description: "Terraform version"
    required: false
    default: "1.5.0"
  environment:
    description: "Environment (dev, staging, prod)"
    required: true
  aws-region:
    description: "AWS region"
    required: false
    default: "us-east-1"
  state-bucket:
    description: "S3 bucket for Terraform state"
    required: true
  state-lock-table:
    description: "DynamoDB table for state locking"
    required: true

outputs:
  plan-summary:
    description: "Terraform plan summary"
    value: ${{ steps.plan.outputs.summary }}

runs:
  using: "composite"
  steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: ${{ inputs.terraform-version }}

    - name: Terraform init
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        terraform init \
          -backend-config="bucket=${{ inputs.state-bucket }}" \
          -backend-config="key=${{ inputs.environment }}/terraform.tfstate" \
          -backend-config="region=${{ inputs.aws-region }}" \
          -backend-config="dynamodb_table=${{ inputs.state-lock-table }}" \
          -upgrade

    - name: Terraform plan
      id: plan
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        TF_VAR_environment: ${{ inputs.environment }}
        TF_VAR_aws_region: ${{ inputs.aws-region }}
      run: |
        terraform plan \
          -var-file="envs/${{ inputs.environment }}.tfvars" \
          -out=tfplan.${{ inputs.environment }} \
          -no-color > plan-summary.txt 2>&1

        # Output summary for step
        {
          echo 'summary<<EOF'
          cat plan-summary.txt
          echo 'EOF'
        } >> $GITHUB_OUTPUT

        echo "✓ Terraform plan generated"

    - name: Save plan artifact
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        mkdir -p /tmp/tf-plans
        cp tfplan.${{ inputs.environment }} /tmp/tf-plans/
        echo "Plan saved to: /tmp/tf-plans/tfplan.${{ inputs.environment }}"

    - name: Run Checkov IaC scan
      uses: bridgecrewio/checkov-action@master
      with:
        directory: ${{ inputs.working-directory }}
        framework: "terraform"
        output_format: "sarif"
        output_file_path: "checkov-tf-results.sarif"
        quiet: true
      continue-on-error: true

    - name: Upload Checkov results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: "checkov-tf-results.sarif"
        category: "checkov-terraform"
      continue-on-error: true

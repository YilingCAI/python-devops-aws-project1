name: Deploy to Production

on:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            image-tag:
                description: "Docker image tag to deploy"
                required: false
                type: string

permissions:
    contents: read
    deployments: write
    pull-requests: write
    id-token: write

jobs:
    pre-release-checks:
        name: Pre-Release Validation
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Verify release commit
              run: |
                  COMMIT_MSG=$(git log -1 --pretty=%B)
                  if [[ $COMMIT_MSG =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]] || [[ $COMMIT_MSG == *"release"* ]]; then
                    echo "✓ Valid release commit detected"
                  else
                    echo "⚠ This may not be a release commit. Proceeding anyway..."
                  fi

            - name: Wait for CI to complete
              uses: tomchv/wait-my-workflow@v1.1.0
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  checkName: "CI / Backend Tests"
                  ref: ${{ github.ref }}
                  timeoutSeconds: 600

    terraform-plan:
        name: Plan Infrastructure
        needs: pre-release-checks
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4

            - name: AWS Authentication
              uses: ./.github/actions/aws-auth
              with:
                  role-arn: ${{ secrets.AWS_ROLE_TO_ASSUME }}

            - name: Terraform Validate
              uses: ./.github/actions/terraform/validate

            - name: Terraform Plan
              uses: ./.github/actions/terraform/plan
              with:
                  environment: prod
                  state-bucket: ${{ secrets.TERRAFORM_STATE_BUCKET }}
                  state-lock-table: ${{ secrets.TERRAFORM_LOCK_TABLE }}

    terraform-approval:
        name: Approve Terraform
        needs: terraform-plan
        runs-on: ubuntu-latest
        environment:
            name: prod-terraform
        steps:
            - run: echo "✓ Terraform changes approved by ${{ github.actor }}"

    deploy-infrastructure:
        name: Deploy to Production
        needs: [terraform-approval]
        uses: ./.github/workflows/deploy.yml
        with:
            environment: prod
            image-tag: ${{ github.event.inputs.image-tag || github.sha }}
            run-terraform: true
            require-approval: false
            terraform-only: false
        secrets:
            AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
            TERRAFORM_STATE_BUCKET: ${{ secrets.TERRAFORM_STATE_BUCKET }}
            TERRAFORM_LOCK_TABLE: ${{ secrets.TERRAFORM_LOCK_TABLE }}

    post-deployment:
        name: Post-Deployment Validation
        needs: deploy-infrastructure
        runs-on: ubuntu-latest
        if: success()
        permissions:
            contents: read
            id-token: write
        steps:
            - name: AWS Authentication
              uses: ./.github/actions/aws-auth
              with:
                  role-arn: ${{ secrets.AWS_ROLE_TO_ASSUME }}

            - name: Extended health checks
              run: |
                  CLUSTER="mypythonproject1-cluster-prod"
                  SERVICES=("backend-service-prod" "frontend-service-prod")

                  for SERVICE in "${SERVICES[@]}"; do
                    echo "Checking $SERVICE..."
                    
                    STATUS=$(aws ecs describe-services \
                      --cluster "$CLUSTER" \
                      --services "$SERVICE" \
                      --query 'services[0].status' \
                      --output text)
                    
                    if [ "$STATUS" = "ACTIVE" ]; then
                      echo "✓ $SERVICE is ACTIVE"
                    else
                      echo "⚠ $SERVICE status: $STATUS"
                    fi
                  done

            - name: Create GitHub release
              uses: actions/github-script@v6
              with:
                  script: |
                      const tag = '${{ github.event.inputs.image-tag || github.sha }}'.substring(0, 8);
                      github.rest.repos.createRelease({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        tag_name: tag,
                        name: `Production Release ${tag}`,
                        body: `Deployed to production at ${new Date().toISOString()}`,
                        draft: false,
                        prerelease: false
                      }).catch(() => console.log('Release already exists'));

            - name: Report success
              run: |
                  echo "## ✅ Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
                  echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
                  echo "- **Image Tag**: ${{ github.event.inputs.image-tag || github.sha }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Deployed by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
                  echo "- **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

    notify-failure:
        name: Notify Failure
        runs-on: ubuntu-latest
        if: failure()
        needs: [deploy-infrastructure]
        steps:
            - name: Report deployment failure
              run: |
                  echo "## ❌ Production Deployment Failed" >> $GITHUB_STEP_SUMMARY
                  echo "- **Environment**: Production" >> $GITHUB_STEP_SUMMARY
                  echo "- **Status**: Failed" >> $GITHUB_STEP_SUMMARY
                  echo "Check workflow logs for details"

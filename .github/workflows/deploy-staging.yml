name: Deploy to Staging

on:
    push:
        branches:
            - develop
    workflow_dispatch:

permissions:
    contents: read
    deployments: write
    id-token: write

jobs:
    validate-ci:
        name: Validate CI Pipeline
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Wait for CI to complete
              uses: tomchv/wait-my-workflow@v1.1.0
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  checkName: "CI / Backend Tests"
                  ref: ${{ github.ref }}
                  timeoutSeconds: 600

    deploy-infrastructure:
        name: Deploy Infrastructure & Services
        needs: validate-ci
        uses: ./.github/workflows/deploy.yml
        with:
            environment: staging
            image-tag: ${{ github.sha }}
            run-terraform: true
            require-approval: false
            terraform-only: false
        secrets:
            AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
            TERRAFORM_STATE_BUCKET: ${{ secrets.TERRAFORM_STATE_BUCKET }}
            TERRAFORM_LOCK_TABLE: ${{ secrets.TERRAFORM_LOCK_TABLE }}

    notify:
        name: Notify Status
        runs-on: ubuntu-latest
        if: always()
        needs: deploy-infrastructure
        steps:
            - name: Report deployment status
              run: |
                  if [[ "${{ needs.deploy-infrastructure.result }}" == "success" ]]; then
                    echo "✅ Staging deployment successful"
                  else
                    echo "❌ Staging deployment failed"
                    exit 1
                  fi
